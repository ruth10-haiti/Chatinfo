<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialConnect - Profil</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>🌐 SocialConnect</h2>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
                <a href="profile.html" class="active"><i class="fas fa-user"></i> Profil</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </div>
    </nav>
    
    <div class="profile-container">
        <div class="profile-header" id="profileHeader">
            <!-- Profil header dynamique -->
        </div>
        
        <div class="profile-content">
            <div class="profile-info-card">
                <div class="edit-profile-btn">
                    <button id="editProfileBtn" class="btn-secondary">✏️ Modifier le profil</button>
                </div>
                
                <div class="profile-stats">
                    <div class="stat">
                        <span class="stat-number" id="profilePostsCount">0</span>
                        <span class="stat-label">Posts</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="profileFollowersCount">0</span>
                        <span class="stat-label">Abonnés</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="profileFollowingCount">0</span>
                        <span class="stat-label">Abonnements</span>
                    </div>
                </div>
                
                <div class="profile-bio-section" id="profileBio">
                    <!-- Bio -->
                </div>
            </div>
            
            <div class="profile-posts">
                <h3>📝 Mes posts</h3>
                <div id="profilePostsList" class="posts-list">
                    <div class="loading">Chargement...</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal d'édition du profil -->
    <div id="editModal" class="modal" style="display: none">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Modifier le profil</h2>
            <form id="editProfileForm">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="editFullName">
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="editBio" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Photo de profil</label>
                    <input type="file" id="editAvatar" accept="image/*">
                </div>
                <button type="submit" class="btn-primary">Enregistrer</button>
            </form>
        </div>
    </div>
    
    <script src="profile.js"></script>
</body>
</html>
